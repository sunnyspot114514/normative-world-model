[base_contract]
comparison_config = "configs/phase3_retained_arm_comparison.toml"
comparison_config_sha256 = "5898fa625b0289b827cb205c228c4a026cbc3564e2399c48640a396b422d2b88"
comparison_selection_lock = "configs/phase3_retained_arm_selection_lock.json"
comparison_selection_lock_sha256 = "b1ccaf4d9f062ea9c4ec2e67c14db3e6328ebc64dd120ca263737b4a3c159624"
v3_config = "configs/phase3_diversity_gateway_v3.toml"
v3_config_sha256 = "841e44ce0ae1282d368491ceaef3d71789b8b8f93d3b17a9b6119dc94496e238"
v3_selection_lock = "configs/phase3_diversity_gateway_v3_selection_lock.json"
