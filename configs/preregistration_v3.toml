schema_version = "3.0-internal-smoke"
status = "v3_renderer_reset_frozen"
frozen_date = "2026-07-16"
retained_discovery_seed = 20260716
must_freeze_before_discovery = true
external_acceptance_required_before_retained = true
internal_review_may_authorize_retained = false

[seeds]
discovery = 20260716
confirmation = 20260816
bootstrap = 20260916

[sample_size]
minimum_discovery_families_per_environment = 1000
minimum_confirmation_families_per_environment_input_cell = 250
target_power = 0.80
pilot_may_increase_confirmation_size = true
pilot_may_change_practical_margins = false

[statistics]
effective_unit = "scenario_family"
bootstrap_samples = 5000
confidence_level = 0.95
cluster_bootstrap = true
binary_paired_secondary_test = "exact_mcnemar"

[leakage]
primary_sham = "surface_sham"
secondary_sham = "sampling_sham"
report_targets_separately = ["physical_delta", "event_record"]
natural_language_surface_sham = "meaning_preserving_profile_paraphrase"
structured_surface_sham = "same_typed_values_with_key_order_whitespace_and_numeric_format_changes_only"
stable_leakage_margin = 0.05
practical_invariance_upper_margin = 0.03
require_lower_confidence_bound_above_zero = true

[incremental_value]
metric = "ood_joint_pair_success"
static_envelope_absolute_margin = 0.05
require_lower_confidence_bound_nonnegative = true

[anti_gaming]
changed_field_macro_f1_noninferiority = 0.02
factual_twin_sensitivity_noninferiority = 0.02
minimum_parse_coverage = 0.995
maximum_constant_rate_excess = 0.02
maximum_normative_pair_accuracy_drop = 0.02

[generator_diversity]
maximum_reason_pair_signature_share = 0.40
minimum_weighted_score_flip_fraction = 0.20
minimum_dimension_sign_coverage_fraction = 0.05
minimum_uncertainty_divergent_family_fraction = 0.03

[normative_margin_strata]
boundary_maximum = 0.02
intermediate_maximum = 0.10
exclude_boundary_cases = false
rebalance_margin_strata = false
non_score_reason_families = [
  "hard_policy_violation",
  "uncertainty_band",
  "dimension_veto",
  "irreversible_harm_veto",
]

[rollout]
h5_to_h1_minimum_ratio = 0.85
h5_minimum_field_macro_f1 = 0.70

[runtime]
minimum_relative_invalid_commit_reduction = 0.50
maximum_absolute_benign_rejection_increase = 0.05
maximum_absolute_task_success_drop = 0.05
allow_irreversible_error_increase = false

[stopping]
maximum_generator_schema_revisions = 2
generator_schema_revisions_used = 1
replace_failed_confirmation_scenarios = false
allow_post_confirmation_threshold_changes = false

[phase1_nontriviality]
maximum_affine_impact_r2 = 0.90
maximum_depth_three_tree_impact_r2 = 0.90
maximum_depth_three_direct_decision_accuracy = 0.90
fit_split = "train"
score_split = "development"

[phase1_state_machine]
minimum_actor_value_physical_sensitivity = 0.25
require_factual_twin_physical_sensitivity = 1.0
require_policy_twin_physical_invariance = 1.0
require_next_state_delta_consistency = 1.0
rollout_horizon = 3
require_rollout_chain_consistency = 1.0

[phase1_language]
maximum_decimal_literals = 0
maximum_key_value_assignments = 0
minimum_mean_word_count = 75
minimum_vocabulary_size = 100
minimum_unique_noncausal_surfaces = 100
maximum_variable_article_errors = 0
maximum_count_agreement_errors = 0
maximum_subject_verb_agreement_errors = 0
maximum_profile_sentence_case_errors = 0
maximum_action_phrase_errors = 0
require_nonconstant_surface_classifier_scores = true
require_full_prompt_audit = true
require_structured_natural_language_information_equivalence = true
gate_c_must_pass_each_environment = true
pooled_gate_c_cannot_override_environment_failure = true

[comparison_contract]
version = "2.1-candidate"
continuous_absolute_tolerance = 0.005
continuous_tolerance_boundary_is_inclusive = true
relative_tolerance = 0.0
accepted_numeric_spellings = ["0.1", "0.10", ".1"]
reject_non_finite_numbers = true
physical_discrete_fields_are_exact = true
event_boolean_integer_enum_and_collection_fields_are_exact = true
same_comparator_for_correctness_invariance_and_all_rollout_horizons = true

[confirmation_design]
presentation = "paired_same_family_across_structured_and_natural_language"
unique_scenario_families_per_environment = 250
total_unique_scenario_families = 500
total_presentations = 1000
effective_unit = "scenario_family"
